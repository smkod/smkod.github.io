<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Terminal/Console Window Background - Maximized height -->
  <rect width="96" height="88" x="2" y="6" rx="8" fill="#0a192f" stroke="#8892b0" stroke-width="2" class="bg" />
  
  <!-- Terminal Header Bar - Thinner to give more room -->
  <path d="M2 14 c0-4.4 3.6-8 8-8 h80 c4.4 0 8 3.6 8 8 v6 H2 z" fill="#112240" class="header" />
  
  <!-- Header Buttons -->
  <circle cx="10" cy="13" r="2.5" fill="#ff5f56" />
  <circle cx="18" cy="13" r="2.5" fill="#ffbd2e" />
  <circle cx="26" cy="13" r="2.5" fill="#27c93f" />

  <!-- Console Text - Significantly larger and centered in the remaining space -->
  <text x="50" y="62" dominant-baseline="middle" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-weight="900" font-size="54" fill="#64ffda" class="text">
    SC
  </text>
  
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #f8fafc; stroke: #475569; }
      .header { fill: #e2e8f0; }
      .text { fill: #0d9488; }
    }
  </style>
</svg>